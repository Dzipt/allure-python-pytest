name: FinApp Demo — Allure TestOps

on:
  workflow_dispatch:
    inputs:
      ALLURE_JOB_RUN_ID:
        description: "service parameter (leave blank)"
        required: false
      ALLURE_USERNAME:
        description: "service parameter (leave blank)"
        required: false
      ENV:
        description: "Environment"
        required: false
        default: "staging"
      RELEASE:
        description: "Release version"
        required: false
        default: "1.0.0"
      RUN_TYPE:
        description: "Run type"
        required: false
        default: "regression"
  schedule:
    - cron: "0 */6 * * *"   # каждые 6 часов для накопления статистики
  push:
    branches: [main]

env:
  ALLURE_ENDPOINT: https://demo.qatools.cloud
  ALLURE_PROJECT_ID: ${{ secrets.ALLURE_PROJECT_ID }}
  ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
  ALLURE_RESULTS: allure-results

jobs:
  # Backend команды
  core-api:
    name: core-api tests
    runs-on: ubuntu-latest
    env:
      GITHUB_RUN_ID: "${{ github.run_id }}-core-api"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install allurectl
        run: |
          wget -q https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -O allurectl
          chmod +x allurectl && sudo mv allurectl /usr/local/bin/allurectl
      - name: Run core-api tests
        run: allurectl watch -- pytest unified-test-launch/core_api/ -v --alluredir=allure-results
        env:
          PLATFORM: backend
          ENV: ${{ github.event.inputs.ENV || 'staging' }}
          RELEASE: ${{ github.event.inputs.RELEASE || '1.0.0' }}
          RUN_TYPE: ${{ github.event.inputs.RUN_TYPE || 'regression' }}
          ALLURE_JOB_NAME: "FinApp — core-api"
          ALLURE_LAUNCH_NAME: "FinApp — core-api — ${{ github.event.inputs.RUN_TYPE || 'regression' }}"

  trading:
    name: trading tests
    runs-on: ubuntu-latest
    env:
      GITHUB_RUN_ID: "${{ github.run_id }}-trading"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install allurectl
        run: |
          wget -q https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -O allurectl
          chmod +x allurectl && sudo mv allurectl /usr/local/bin/allurectl
      - name: Run trading tests
        run: allurectl watch -- pytest unified-test-launch/trading/ -v --alluredir=allure-results
        env:
          PLATFORM: backend
          ENV: ${{ github.event.inputs.ENV || 'staging' }}
          RELEASE: ${{ github.event.inputs.RELEASE || '1.0.0' }}
          RUN_TYPE: ${{ github.event.inputs.RUN_TYPE || 'regression' }}
          ALLURE_JOB_NAME: "FinApp — trading"
          ALLURE_LAUNCH_NAME: "FinApp — trading — ${{ github.event.inputs.RUN_TYPE || 'regression' }}"

  # Клиентские команды
  ios:
    name: iOS tests
    runs-on: ubuntu-latest
    env:
      GITHUB_RUN_ID: "${{ github.run_id }}-ios"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install allurectl
        run: |
          wget -q https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -O allurectl
          chmod +x allurectl && sudo mv allurectl /usr/local/bin/allurectl
      - name: Run iOS tests
        run: allurectl watch -- pytest unified-test-launch/ios/ -v --alluredir=allure-results
        env:
          PLATFORM: iOS
          ENV: ${{ github.event.inputs.ENV || 'staging' }}
          RELEASE: ${{ github.event.inputs.RELEASE || '1.0.0' }}
          RUN_TYPE: ${{ github.event.inputs.RUN_TYPE || 'regression' }}
          ALLURE_JOB_NAME: "FinApp — iOS"
          ALLURE_LAUNCH_NAME: "FinApp — iOS — ${{ github.event.inputs.RUN_TYPE || 'regression' }}"

  android:
    name: Android tests
    runs-on: ubuntu-latest
    env:
      GITHUB_RUN_ID: "${{ github.run_id }}-android"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install allurectl
        run: |
          wget -q https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -O allurectl
          chmod +x allurectl && sudo mv allurectl /usr/local/bin/allurectl
      - name: Run Android tests
        run: allurectl watch -- pytest unified-test-launch/android/ -v --alluredir=allure-results
        env:
          PLATFORM: Android
          ENV: ${{ github.event.inputs.ENV || 'staging' }}
          RELEASE: ${{ github.event.inputs.RELEASE || '1.0.0' }}
          RUN_TYPE: ${{ github.event.inputs.RUN_TYPE || 'regression' }}
          ALLURE_JOB_NAME: "FinApp — Android"
          ALLURE_LAUNCH_NAME: "FinApp — Android — ${{ github.event.inputs.RUN_TYPE || 'regression' }}"

  web:
    name: Web tests
    runs-on: ubuntu-latest
    env:
      GITHUB_RUN_ID: "${{ github.run_id }}-web"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install allurectl
        run: |
          wget -q https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -O allurectl
          chmod +x allurectl && sudo mv allurectl /usr/local/bin/allurectl
      - name: Run Web tests
        run: allurectl watch -- pytest unified-test-launch/web/ -v --alluredir=allure-results
        env:
          PLATFORM: Web
          ENV: ${{ github.event.inputs.ENV || 'staging' }}
          RELEASE: ${{ github.event.inputs.RELEASE || '1.0.0' }}
          RUN_TYPE: ${{ github.event.inputs.RUN_TYPE || 'regression' }}
          ALLURE_JOB_NAME: "FinApp — Web"
          ALLURE_LAUNCH_NAME: "FinApp — Web — ${{ github.event.inputs.RUN_TYPE || 'regression' }}"