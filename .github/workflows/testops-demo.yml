name: Демо-набор TestOps

on:
  workflow_dispatch:
    inputs:
      ALLURE_JOB_RUN_ID:
        description: "ALLURE_JOB_RUN_ID - service parameter (leave blank)"
        required: false
      ALLURE_USERNAME:
        description: "ALLURE_USERNAME service parameter. Leave blank"
        required: false
      ENV:
        description: "Environment"
        required: false
        default: "stage"
      BROWSER:
        description: "Browser"
        required: false
        default: "chrome"
      PLATFORM:
        description: "Platform"
        required: false
        default: "ubuntu-latest"
      RELEASE:
        description: "Release version"
        required: false
        default: "2026.07-demo"
      RUN_TYPE:
        description: "Run type"
        required: false
        default: "regression"
      TESTOPS_DEMO_RUN:
        description: "1 - первый красный запуск, 2 - повторный запуск с зелеными нестабильными тестами"
        required: false
        default: "1"
      PYTEST_ARGS:
        description: "Дополнительные аргументы pytest"
        required: false
        default: ""

env:
  ALLURE_ENDPOINT: https://demo.qatools.cloud/
  ALLURE_PROJECT_ID: 568
  ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
  ALLURE_JOB_RUN_ID: ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}
  ALLURE_RESULTS: allure-results

jobs:
  testops_demo:
    name: Запуск демо-тестов TestOps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Настроить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Установить allurectl
        uses: allure-framework/setup-allurectl@v1

      - name: Запустить демо-набор TestOps
        continue-on-error: true
        run: |
          allurectl watch -- bash -c '
            python -m pytest testops_demo/ -v --alluredir="${ALLURE_RESULTS}" -p no:cacheprovider ${{ github.event.inputs.PYTEST_ARGS }}
            test_status=$?

            mkdir -p "${ALLURE_RESULTS}"
            {
              printf "Build_number=%s\n" "${BUILD_NUMBER}"
              printf "Demo_run_number=%s\n" "${TESTOPS_DEMO_RUN_NUMBER}"
              printf "Commit=%s\n" "${COMMIT}"
              printf "Python_version=%s\n" "$(python --version | awk "{print \$2}")"
              printf "Worker_OS=%s\n" "$(uname -a)"
              printf "Environment=%s\n" "${ENV}"
              printf "Browser=%s\n" "${BROWSER}"
              printf "Platform=%s\n" "${PLATFORM}"
              printf "Release=%s\n" "${RELEASE}"
              printf "Run_type=%s\n" "${RUN_TYPE}"
              printf "Branch=%s\n" "${BRANCH}"
            } > "${ALLURE_RESULTS}/environment.properties"

            exit "${test_status}"
          '
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          COMMIT: ${{ github.sha }}
          ENV: ${{ github.event.inputs.ENV || 'stage' }}
          BROWSER: ${{ github.event.inputs.BROWSER || 'chrome' }}
          PLATFORM: ${{ github.event.inputs.PLATFORM || 'ubuntu-latest' }}
          RELEASE: ${{ github.event.inputs.RELEASE || '2026.07-demo' }}
          BRANCH: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
          TESTOPS_DEMO_BRANCH: ${{ github.ref_name }}
          TESTOPS_DEMO_BROWSER: ${{ github.event.inputs.BROWSER || 'chrome' }}
          TESTOPS_DEMO_PLATFORM: ${{ github.event.inputs.PLATFORM || 'ubuntu-latest' }}
          TESTOPS_DEMO_ENV: ${{ github.event.inputs.ENV || 'stage' }}
          TESTOPS_DEMO_RELEASE: ${{ github.event.inputs.RELEASE || '2026.07-demo' }}
          TESTOPS_DEMO_RUN: ${{ github.event.inputs.TESTOPS_DEMO_RUN || '1' }}
          TESTOPS_DEMO_RUN_NUMBER: ${{ github.run_number }}
          RUN_TYPE: ${{ github.event.inputs.RUN_TYPE || 'regression' }}
          ALLURE_LAUNCH_NAME: "Демо TestOps - ${{ github.event.inputs.RUN_TYPE || 'regression' }}"
          ALLURE_JOB_RUN_ID: ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}
          ALLURE_RESULTS: allure-results

      - name: Загрузить результаты Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testops-demo-allure-results
          path: ${{ env.ALLURE_RESULTS }}
          if-no-files-found: warn
