name: Selective Rerun from Allure

on:
  workflow_dispatch:
    inputs:
      ALLURE_JOB_RUN_ID:
        description: "Allure Job Run ID (required for rerun)"
        required: true
      TEST_LIST:
        description: "Comma-separated test IDs to rerun (e.g., PAY-001,CART-005)"
        required: true
      ENDPOINT:
        description: "Target Environment"
        required: false
        default: "demo.qatools.cloud"
      BROWSER:
        description: "Browser"
        required: false
        default: "Chrome"
      OS:
        description: "Operating System"
        required: false
        default: "Ubuntu 22.04"

env:
  ALLURE_ENDPOINT: https://demo.qatools.cloud/
  ALLURE_PROJECT_ID: 533
  ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
  ALLURE_RESULTS: "allure-results"
  ALLURE_JOB_RUN_ID: ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}
  ALLURE_LAUNCH_NAME: "Rerun - ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}"

jobs:
  selective_rerun:
    name: Selective Rerun
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install allurectl
        uses: allure-framework/setup-allurectl@v1

      - name: Get launch info from Allure
        id: get_launch
        run: |
          # Получаем информацию о запуске по ALLURE_JOB_RUN_ID
          LAUNCH_INFO=$(curl -s \
            -H "Authorization: Bearer ${{ env.ALLURE_TOKEN }}" \
            "${{ env.ALLURE_ENDPOINT }}/api/rs/launch/${{ env.ALLURE_JOB_RUN_ID }}")
          
          echo "Launch info: $LAUNCH_INFO"

      - name: Create rerun launch
        id: create_launch
        run: |
          # Создаём новый launch для результатов перезапуска
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ env.ALLURE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "projectId": ${{ env.ALLURE_PROJECT_ID }},
              "name": "${{ env.ALLURE_LAUNCH_NAME }}",
              "tags": ["rerun", "selective"],
              "parentLaunchId": ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}
            }' \
            "${{ env.ALLURE_ENDPOINT }}/api/rs/launch")
          
          LAUNCH_ID=$(echo $RESPONSE | jq -r '.id')
          echo "LAUNCH_ID=$LAUNCH_ID" >> $GITHUB_ENV
          echo "launch_id=$LAUNCH_ID" >> $GITHUB_OUTPUT
          
          echo "✅ Created rerun launch with ID: $LAUNCH_ID"

      - name: Run selected tests
        run: |
          # Преобразуем список тестов в параметры pytest
          IFS=',' read -ra TESTS <<< "${{ env.TEST_LIST }}"
          TEST_FILTER=""
          for test in "${TESTS[@]}"; do
            # Ищем тест по ID в сгенерированных функциях
            # test_PAY_001_payment -> test_PAY_001_card_payment
            TEST_FILTER="$TEST_FILTER -k $test"
          done
          
          echo "Running tests: $TEST_FILTER"
          
          pytest test_demo_ecommerce.py $TEST_FILTER \
            --alluredir=${ALLURE_RESULTS} \
            --capture=no \
            --tb=short \
            2>&1 | tee pytest.log
        env:
          TEST_LIST: ${{ github.event.inputs.TEST_LIST }}
          ENDPOINT: ${{ github.event.inputs.ENDPOINT }}
          BROWSER: ${{ github.event.inputs.BROWSER }}
          OS: ${{ github.event.inputs.OS }}
        continue-on-error: true

      - name: Upload results to rerun launch
        if: always()
        run: |
          allurectl upload \
            --project-id ${{ env.ALLURE_PROJECT_ID }} \
            --launch-id ${{ env.LAUNCH_ID }} \
            ${ALLURE_RESULTS}

      - name: Close rerun launch
        if: always()
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ env.ALLURE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"closed": true}' \
            "${{ env.ALLURE_ENDPOINT }}/api/rs/launch/${{ env.LAUNCH_ID }}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-rerun-${{ github.run_id }}
          path: ${{ env.ALLURE_RESULTS }}
          retention-days: 7