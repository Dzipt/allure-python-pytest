name: Allure Stable Flaky Suite

on:
  workflow_dispatch:
    inputs:
      ALLURE_JOB_RUN_ID:
        description: ALLURE_JOB_RUN_ID - service parameter (leave blank)
        required: false
      ENDPOINT:
        description: Endpoint
        required: false
        default: demo.qatools.cloud
      BROWSER:
        description: Browser
        required: false
        default: Opera
      OS:
        description: OS
        required: false
        default: macOS
      ASR_DEVICE:
        description: DEVICE
        required: false
        default: Galaxy s25 Plus
      ASR_LANGUAGE:
        description: LANGUAGE
        required: false
        default: Ko
      ALLURE_USERNAME:
        description: "ALLURE_USERNAME service parameter. Leave blank"
        required: false

env:
  ALLURE_ENDPOINT: https://demo.qatools.cloud/
  ALLURE_PROJECT_ID: 533
  ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
  ALLURE_JOB_RUN_ID: ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}
  ALLURE_RESULTS: "allure-results"
  RUN_NUMBER: ${{ github.run_number }}

jobs:
  stable_flaky_suite:
    name: Run stable + flaky suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install allurectl
        uses: allure-framework/setup-allurectl@v1

      - name: Run stable flaky test suite
        run: allurectl watch -- pytest test/test_banking_demo1.py --alluredir=${ALLURE_RESULTS} --capture=no
        env:
          ENDPOINT: ${{ github.event.inputs.ENDPOINT}}
          BROWSER: ${{ github.event.inputs.BROWSER}}
          ASR_DEVICE: ${{ github.event.inputs.ASR_DEVICE}}
          ASR_LANGUAGE: ${{ github.event.inputs.ASR_LANGUAGE}}
          OS: ${{ github.event.inputs.OS}}
          ALLURE_JOB_RUN_ID: ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}
          ALLURE_RESULTS: "allure-results"
