          chmod +x allurectl && sudo mv allurectl /usr/local/bin/allurectl
      - name: Run trading tests
        run: allurectl watch -- pytest tests/trading/ -v --alluredir=allure-results
        env:
          PLATFORM: backend
          ENV: ${{ github.event.inputs.ENV || 'staging' }}
          RELEASE: ${{ github.event.inputs.RELEASE || '1.0.0' }}
          RUN_TYPE: ${{ github.event.inputs.RUN_TYPE || 'regression' }}
          ALLURE_JOB_RUN_ID: ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}

  # Клиентские команды
  ios:
    name: iOS tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install allurectl
        run: |
          wget -q https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -O allurectl
          chmod +x allurectl && sudo mv allurectl /usr/local/bin/allurectl
      - name: Run iOS tests
        run: allurectl watch -- pytest tests/ios/ -v --alluredir=allure-results
        env:
          PLATFORM: iOS
          ENV: ${{ github.event.inputs.ENV || 'staging' }}
          RELEASE: ${{ github.event.inputs.RELEASE || '1.0.0' }}
          RUN_TYPE: ${{ github.event.inputs.RUN_TYPE || 'regression' }}
          ALLURE_JOB_RUN_ID: ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}

  android:
    name: Android tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
